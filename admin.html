<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administration FAQ | La Maison du Bosquet</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="style.css">
  <style>
    .admin-container { max-width: 800px; margin: 4rem auto; padding: 2rem; background: var(--color-white); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    .faq-form { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 3rem; padding-bottom: 2rem; border-bottom: 1px solid var(--color-border); }
    .faq-form input, .faq-form textarea { width: 100%; padding: 1rem; border-radius: 10px; border: 1px solid var(--color-border); font-family: inherit; font-size: 1rem; }
    .faq-list-item { padding: 1.5rem; border: 1px solid var(--color-border); border-radius: 10px; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: flex-start; background: #fafafa; }
    .faq-actions { display: flex; gap: 0.5rem; margin-left: 1rem; }
    .btn-danger { background: #ff4757; color: white; border: none; padding: 0.5rem 1rem; border-radius: 5px; cursor: pointer; transition: 0.2s; }
    .btn-danger:hover { background: #ff2e40; }
    .btn-edit { background: var(--color-primary); color: white; border: none; padding: 0.5rem 1rem; border-radius: 5px; cursor: pointer; transition: 0.2s; }
    .btn-edit:hover { background: #4a5c53; }
    #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--color-bg); display: flex; justify-content: center; align-items: center; z-index: 1000; }
    #login-box { background: white; padding: 3rem; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 400px; width: 90%; }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--color-primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 2rem auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body style="background-color: var(--color-bg);">

  <!-- HEADER -->
  <header class="site-header" style="background: var(--color-primary);">
    <div class="container" style="display: flex; justify-content: center; padding: 1rem;">
      <a href="index.html"><img src="Branding/MaisonDuBosquet_logo_vectorise_blanc.svg" alt="La Maison du Bosquet" style="height: 40px;"></a>
    </div>
  </header>

  <!-- ECRAN DE CONNEXION -->
  <div id="login-screen">
    <div id="login-box">
      <img src="Branding/LogoVert.png" alt="Logo" style="height: 60px; margin-bottom: 2rem;">
      <h2 style="margin-bottom: 1.5rem; color: var(--color-text); font-size: clamp(1.5rem, 6vw, 2rem);">Administration</h2>
      <p style="margin-bottom: 1.5rem; color: var(--color-text-light); font-size: 0.9rem;">Espace sécurisé pour gérer les questions de la FAQ.</p>
      <input type="password" id="admin-pwd" placeholder="Mot de passe" style="padding: 1rem; width: 100%; border-radius: 10px; border: 1px solid var(--color-border); margin-bottom: 1rem; outline: none;">
      <button class="btn btn-primary" style="width: 100%;" onclick="checkPwd()">Se connecter</button>
      <p id="pwd-error" style="color: #ff4757; display: none; margin-top: 1rem; font-size: 0.9rem;">Mot de passe incorrect</p>
    </div>
  </div>

  <!-- CONTENU ADMIN -->
  <div class="admin-container" id="admin-content" style="display: none;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
      <h1>Gestion de la FAQ</h1>
      <a href="faq.html" class="btn" style="border: 1px solid var(--color-border); padding: 0.5rem 1rem;">Voir la page FAQ</a>
    </div>
    
    <div class="faq-form">
      <h3 style="margin-bottom: 1rem;">Ajouter / Modifier une question</h3>
      <input type="hidden" id="faq-id">
      <input type="text" id="faq-question" placeholder="La question (ex: Quels sont les tarifs ?)" required>
      <textarea id="faq-answer" placeholder="La réponse..." rows="5" required></textarea>
      <button class="btn btn-primary" onclick="saveFaq()" style="align-self: flex-start;">Enregistrer la question</button>
    </div>

    <h3 style="margin-bottom: 1rem;">Toutes les questions (<span id="faq-count">0</span>)</h3>
    <div id="faq-list">
      <div class="loader"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = 'https://sroblumotqhimuucoelp.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNyb2JsdW1vdHFoaW11dWNvZWxwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyODk1NzIsImV4cCI6MjA5Nzg2NTU3Mn0.Qw8rxnHF1Fmv89Voohkw_cwnfILRYx2CFy9hLOzGX20';
    const supa = supabase.createClient(supabaseUrl, supabaseKey);

    // Permettre la validation par touche "Entrée"
    document.getElementById('admin-pwd').addEventListener('keypress', function (e) {
      if (e.key === 'Enter') {
        checkPwd();
      }
    });

    function checkPwd() {
      const pwd = document.getElementById('admin-pwd').value;
      // Mot de passe simple (modifiable)
      if (pwd === 'bosquet2026') {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('admin-content').style.display = 'block';
        loadFaqs();
      } else {
        document.getElementById('pwd-error').style.display = 'block';
      }
    }

    async function loadFaqs() {
      const listEl = document.getElementById('faq-list');
      const { data, error } = await supa.from('faq').select('*').order('id', { ascending: false });
      
      if (error) {
        listEl.innerHTML = `<p style="color:#ff4757;">Erreur de chargement de la base de données: ${error.message}</p>`;
        return;
      }
      
      document.getElementById('faq-count').innerText = data.length;

      if (data.length === 0) {
        listEl.innerHTML = '<p style="color: var(--color-text-light); text-align: center; padding: 2rem;">Aucune question pour le moment. Ajoutez-en une au-dessus !</p>';
        return;
      }

      listEl.innerHTML = '';
      data.forEach(faq => {
        const item = document.createElement('div');
        item.className = 'faq-list-item';
        item.innerHTML = `
          <div style="flex: 1;">
            <strong style="color: var(--color-primary); display: block; margin-bottom: 0.5rem; font-size: 1.1rem;">${faq.question}</strong>
            <p style="margin: 0; font-size: 0.95rem; line-height: 1.5; color: var(--color-text);">${faq.answer.replace(/\n/g, '<br>')}</p>
          </div>
          <div class="faq-actions">
            <button class="btn-edit" onclick="editFaq(${faq.id}, \`${faq.question.replace(/"/g, '&quot;').replace(/`/g, '\\`')}\`, \`${faq.answer.replace(/"/g, '&quot;').replace(/`/g, '\\`')}\`)">Modifier</button>
            <button class="btn-danger" onclick="deleteFaq(${faq.id})">Supprimer</button>
          </div>
        `;
        listEl.appendChild(item);
      });
    }

    async function saveFaq() {
      const id = document.getElementById('faq-id').value;
      const question = document.getElementById('faq-question').value.trim();
      const answer = document.getElementById('faq-answer').value.trim();

      if (!question || !answer) {
        alert('Veuillez remplir la question ET la réponse avant de sauvegarder.');
        return;
      }

      // Loader on button
      const btn = document.querySelector('.faq-form .btn-primary');
      const originalText = btn.innerText;
      btn.innerText = "Enregistrement...";
      btn.disabled = true;

      try {
        if (id) {
          const { error } = await supa.from('faq').update({ question, answer }).eq('id', id);
          if (error) throw error;
        } else {
          const { error } = await supa.from('faq').insert([{ question, answer }]);
          if (error) throw error;
        }

        // Réinitialiser le formulaire
        document.getElementById('faq-id').value = '';
        document.getElementById('faq-question').value = '';
        document.getElementById('faq-answer').value = '';
        
        // Recharger la liste
        await loadFaqs();
      } catch (err) {
        alert("Une erreur est survenue : " + err.message);
      } finally {
        btn.innerText = originalText;
        btn.disabled = false;
      }
    }

    function editFaq(id, question, answer) {
      document.getElementById('faq-id').value = id;
      document.getElementById('faq-question').value = question;
      document.getElementById('faq-answer').value = answer;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function deleteFaq(id) {
      if(confirm('Êtes-vous sûr de vouloir supprimer définitivement cette question ?')) {
        const { error } = await supa.from('faq').delete().eq('id', id);
        if (error) alert("Erreur : " + error.message);
        else loadFaqs();
      }
    }
  </script>
</body>
</html>
